<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viagem Compartilhada</title>

    <link rel="stylesheet" href="styles/style_cadastro.css">

    <link rel="shortcut icon" href="imagens/logo_png.png" type="image/x-icon">
</head>

<body>
    <header>
        <div class="lado-a-lado">
            <img src="imagens/logo_png.png" alt="Logo Viagem Compartilhada">
            <h1>Viagem Compartilhada</h1>
        </div>

        <nav>
            <ul>
                <li><a href="#">Minhas Viagens</a></li>
                <li><a href="destinos.html">Destinos</a></li>
                <li><a href="favoritos.html">Favoritos</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="ciclo">
            <div class="fases" id="atual">
                <p>1</p>
            </div>

            <div class="fases">
                <p>2</p>
            </div>

            <div class="fases">
                <p>3</p>
            </div>

            <div class="fases">
                <p>4</p>
            </div>
        </div>

        <div class="container">
            <button class="recarregar" onclick="location.reload()">
                <img src="imagens/reiniciar.png" alt="Recarregar">
            </button>

            <h2>Nova Viagem - Informações Básicas</h2>

            <form action="/passo1" method="POST">
                <label>Local Visitado (País, Cidade):</label>
                <input type="text" name="local" placeholder="Ex: Itália, Roma" required><br>

                <div class="linha">
                    <div class="campo">
                        <label>Início da Viagem:</label>
                        <input type="date" name="inicio" required><br> 
                    </div><br>

                    <div class="campo">
                        <label>Término da Viagem:</label>
                        <input type="date" name="final" required><br> 
                    </div><br>
                </div>

                <label>Descrição:</label>
                <input type="text" name="descricao" placeholder="Ex: Experiência fascinante, a cidade é um museu a céu aberto!" required><br>    
                
                <button type="submit" class="botao">Seguinte</button>
            </form>
        </div>

        <script src="scripts/index.js"></script>
    </main>
</body>
</html>
