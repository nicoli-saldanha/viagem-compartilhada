<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viagem Compartilhada</title>

    <link rel="stylesheet" href="styles/style_restaurante.css">

    <link rel="shortcut icon" href="imagens/logo_png.png" type="image/x-icon">
</head>

<body>
    <header>
        <div class="lado-a-lado">
            <img src="imagens/logo_png.png" alt="Logo Viagem Compartilhada">
            <h1>Viagem Compartilhada</h1>
        </div>

        <nav>
            <ul>
                <li><a href="#">Minhas Viagens</a></li>
                <li><a href="destinos.html">Destinos</a></li>
                <li><a href="configuracoes.html">Configurações</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="ciclo">
            <div class="fases">
                <p>1</p>
            </div>

            <div class="fases">
                <p>2</p>
            </div>

            <div class="fases" id="atual">
                <p>3</p>
            </div>

            <div class="fases">
                <p>4</p>
            </div>
        </div>

        <div class="container">
            <button class="recarregar" onclick="location.reload()">
                <img src="imagens/reiniciar.png" alt="Recarregar">
            </button>

            <h2>Nova Viagem - Restaurantes</h2>

            <form action="/passo3" method="POST">

                <div class="linha">
                    <div class="campo">
                        <label>Restaurante 1:</label>
                        <input type="text" id="restaurante1" name="restaurante1" placeholder="Ex: Tonnarello"
                            required>
                    </div>

                    <div class="campo">
                        <label>Nota (0 a 10):</label>
                        <input type="number" id="nota1" name="nota1" required min="0" max="10">
                    </div>
                </div><br>

                <div class="linha">
                    <div class="campo">
                        <label>Restaurante 2:</label>
                        <input type="text" id="restaurante2" name="restaurante2" placeholder="Opcional">
                    </div>

                    <div class="campo">
                        <label>Nota (0 a 10):</label>
                        <input type="number" id="nota2" name="nota2" min="0" max="10">
                    </div>
                </div><br>

                <div class="linha">
                    <div class="campo">
                        <label>Restaurante 3:</label>
                        <input type="text" id="restaurante3" name="restaurante3" placeholder="Opcional">
                    </div>

                    <div class="campo">
                        <label>Nota (0 a 10):</label>
                        <input type="number" id="nota3" name="nota3" min="0" max="10" class="menor">
                    </div>
                </div><br>

                <div class="linha">
                    <div class="campo">
                        <label>Restaurante 4:</label>
                        <input type="text" id="restaurante4" name="restaurante4" placeholder="Opcional">
                    </div>

                    <div class="campo">
                        <label>Nota (0 a 10):</label>
                        <input type="number" id="nota4" name="nota4" min="0" max="10">
                    </div>
                </div><br>

                <button type="submit" class="botao">Seguinte</button>
            </form>

            <script src="scripts/index.js"></script>
    </main>
</body>

</html>
