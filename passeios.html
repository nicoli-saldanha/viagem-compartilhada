<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viagem Compartilhada</title>

    <link rel="stylesheet" href="styles/style_passeios.css">

    <link rel="shortcut icon" href="imagens/logo_png.png" type="image/x-icon">
</head>

<body>
    <header>
        <div class="lado-a-lado">
            <img src="imagens/logo_png.png" alt="Logo Viagem Compartilhada">
            <h1>Viagem Compartilhada</h1>
        </div>

        <nav>
            <ul>
                <li><a href="#">Minhas Viagens</a></li>
                <li><a href="destinos.html">Destinos</a></li>
                <li><a href="configuracoes.html">Configurações</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="ciclo">
            <div class="fases">
                <p>1</p>
            </div>

            <div class="fases" id="atual">
                <p>2</p>
            </div>

            <div class="fases">
                <p>3</p>
            </div>

            <div class="fases">
                <p>4</p>
            </div>
        </div>

        <div class="container">
            <button class="recarregar" onclick="location.reload()">
                <img src="imagens/reiniciar.png" alt="Recarregar">
            </button>

            <h2>Nova Viagem - Passeios</h2>

            <form action="/passo2" method="POST">
                <div class="campo">
                    <label>Passeio 1:</label>
                    <input type="text" id="passeio1" name="passeio1" placeholder="Ex: Visita ao Coliseu" required>
                </div>

                <div class="campo">
                    <label>Passeio 2:</label>
                    <input type="text" id="passeio2" name="passeio2" placeholder="Opcional">
                </div>

                <div class="campo">
                    <label>Passeio 3:</label>
                    <input type="text" id="passeio3" name="passeio3" placeholder="Opcional">
                </div>

                <div class="campo">
                    <label>Passeio 4:</label>
                    <input type="text" id="passeio4" name="passeio4" placeholder="Opcional">
                </div>

                <button type="submit" class="botao">Seguinte</button>
        </div>

        <script src="scripts/index.js"></script>
    </main>
</body>

</html>
